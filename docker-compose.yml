services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: inventory-order-management-api:local
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-inventory_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REDIS_REQUIRED: "true"
      RUN_MIGRATIONS: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/live', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  celery-worker:
    image: inventory-order-management-api:local
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.core.celery.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2}
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-inventory_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      RUN_MIGRATIONS: "false"
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.core.celery.celery_app inspect ping -d celery@$${HOSTNAME} || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  celery-beat:
    image: inventory-order-management-api:local
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.core.celery.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-inventory_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      RUN_MIGRATIONS: "false"
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-inventory_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-inventory_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
