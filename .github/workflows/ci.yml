name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inventory_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d inventory_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      APP_NAME: Inventory API
      APP_VERSION: 1.0.0
      APP_ENV: test
      DEBUG: false
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/inventory_test
      SECRET_KEY: test-secret-key-at-least-32-characters
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[dev]' pip-audit
      - run: alembic upgrade head
      # run: ruff check app tests
      - run: mypy app
      - run: pip-audit --strict --desc on
      - run: pytest -q

  container:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: inventory-order-management:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
